name: Sync Translations

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout launcher repo
        uses: actions/checkout@v4

      - name: Checkout nrc-configs repo
        uses: actions/checkout@v4
        with:
          repository: NoRiskClient/nrc-configs
          ref: main
          path: _nrc-configs
          sparse-checkout: translations/launcher

      - name: Sync translation files
        run: |
          cp _nrc-configs/translations/launcher/*.json src/i18n/translations/
          rm -rf _nrc-configs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/i18n/translations/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/i18n/translations/
          git commit -m "chore: sync translations from nrc-configs"
          git push
