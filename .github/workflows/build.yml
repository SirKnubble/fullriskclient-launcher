name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - linux
          - macos-arm64
          - macos-x86_64
      release_tag:
        description: Release tag to upload to (empty = latest release)
        required: false
        type: string
      upload_to_release:
        description: Upload artifacts to the selected/latest release
        required: true
        default: true
        type: boolean

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Build matrix
        id: matrix
        shell: bash
        run: |
          windows='{"name":"windows","os":"windows-latest","target":"","args":"","artifact_name":"NoRiskClient-Windows","artifact_paths":"src-tauri/target/release/bundle/nsis/*.exe"}'
          linux='{"name":"linux","os":"ubuntu-22.04","target":"","args":"","artifact_name":"NoRiskClient-Linux","artifact_paths":"src-tauri/target/release/bundle/appimage/*.AppImage\nsrc-tauri/target/release/bundle/deb/*.deb"}'
          macos_arm64='{"name":"macos-arm64","os":"macos-latest","target":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin","artifact_name":"NoRiskClient-MacOS-arm64","artifact_paths":"src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg\nsrc-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz"}'
          macos_x86_64='{"name":"macos-x86_64","os":"macos-latest","target":"x86_64-apple-darwin","args":"--target x86_64-apple-darwin","artifact_name":"NoRiskClient-MacOS-x86_64","artifact_paths":"src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg\nsrc-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz"}'

          platform="${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}"

          case "$platform" in
            windows)
              matrix="{\"include\":[$windows]}"
              ;;
            linux)
              matrix="{\"include\":[$linux]}"
              ;;
            macos-arm64)
              matrix="{\"include\":[$macos_arm64]}"
              ;;
            macos-x86_64)
              matrix="{\"include\":[$macos_x86_64]}"
              ;;
            all)
              matrix="{\"include\":[$windows,$linux,$macos_arm64,$macos_x86_64]}"
              ;;
            *)
              echo "Unknown platform: $platform" >&2
              exit 1
              ;;
          esac

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install Rust stable
        if: matrix.target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        env:
          RUSTFLAGS: ${{ matrix.os == 'ubuntu-22.04' && '-C link-arg=-Wl,--no-as-needed -C link-arg=-layatana-appindicator3 -C link-arg=-Wl,--as-needed' || '' }}
        run: yarn tauri build --verbose ${{ matrix.args }}

      - name: Rename artifacts
        shell: bash
        run: |
          shopt -s nullglob
          platform="${{ matrix.name }}"

          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue

            for file in $pattern; do
              dir="$(dirname "$file")"
              name="$(basename "$file")"

              case "$platform:$name" in
                windows:*.exe)
                  renamed="FullriskLauncher-Windows-Setup.exe"
                  ;;
                linux:*.AppImage)
                  renamed="FullriskLauncher-Linux.AppImage"
                  ;;
                linux:*.deb)
                  renamed="FullriskLauncher-Linux.deb"
                  ;;
                macos-arm64:*.dmg)
                  renamed="FullriskLauncher-macOS-arm64.dmg"
                  ;;
                macos-arm64:*.app.tar.gz)
                  renamed="FullriskLauncher-macOS-arm64.app.tar.gz"
                  ;;
                macos-x86_64:*.dmg)
                  renamed="FullriskLauncher-macOS-x86_64.dmg"
                  ;;
                macos-x86_64:*.app.tar.gz)
                  renamed="FullriskLauncher-macOS-x86_64.app.tar.gz"
                  ;;
                *)
                  renamed="${name//NoRisk Launcher/Fullrisk Launcher}"
                  renamed="${renamed//NoRiskClient/FullriskLauncher}"
                  ;;
              esac

              if [[ "$name" != "$renamed" ]]; then
                mv "$file" "$dir/$renamed"
              fi
            done
          done <<< "${{ matrix.artifact_paths }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  release:
    name: Upload release artifacts
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -print

      - name: Resolve release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${{ github.ref_name }}"

            if ! gh release view "$tag" >/dev/null 2>&1; then
              args=(gh release create "$tag" --title "Release $tag" --notes "Automated release for tag $tag.")

              if [[ "$tag" == *-alpha* || "$tag" == *-beta* || "$tag" == *-rc* ]]; then
                args+=(--prerelease)
              fi

              "${args[@]}"
            fi
          else
            tag="${{ inputs.release_tag }}"

            if [[ -z "$tag" ]]; then
              tag="$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name)"
            fi
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -d '' files < <(find artifacts -type f -print0)

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No artifacts found to upload." >&2
            exit 1
          fi

          gh release upload "${{ steps.release.outputs.tag }}" "${files[@]}" --clobber
